<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BW Main page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- As a link  Header-->
    <nav class="navbar navbar-light bg-transparent border-bottom"> <!--배경색 투명, 선으로만 보이게끔-->
        <div class="container-fluid">
            <a class="navbar-brand text-dark" href="{% url "users:main" %}"><strong>BW</strong></a>
            <div class="d-flex">
                <a class="btn btn-dark btn-sm me-2" href="{% url "users:login" %}">Log In</a>
                <a class="btn btn-dark btn-sm" href="{% url "accounts:register" %}">Register</a>
            </div>
        </div>
    </nav>

    <style>
        body {
            font-family: sans-serif;
            background-color:rgb(255, 255, 255);
            min-height: 100vh; /* 최소 높이를 100vh로 설정하여 화면 전체를 채우도록 함 */

        }
        .wrapper {
            display: flex;
            flex-direction: column; /* 내용을 세로로 정렬 */
            min-height: 100vh; /* 최소 높이를 100vh로 설정하여 body와 동일하게 함 */
        }

        .container {
            margin-top: 20px;
        }
        .card {
            margin-bottom: 20px;
            padding: 10px;
        }
        .card-img-top {
            background-color: #f0f0f0; /* Placeholder gray color */
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 16px;
            text-align: center;
        }
        .col-md-9 {
            margin: 0 auto; /* 좌우 마진을 auto로 설정 */
            float: none;    /* float 속성 제거 */
        }
        .btn-custom {
            background-color: white;
            color: black;
            border: 1px solid #ced4da;
            border-radius: 5px;
            margin-bottom: 5px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-custom:hover {
            background-color: #e9ecef; /* Light gray on hover */
        }

        .btn-custom i {
            margin-left: 5px; /* Space between text and icon */
        }
        .placeholder-image {
            width: 100%;
            height: 200px; /* Adjust as needed */
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            margin-bottom: 10px; /* Added spacing between images */
        }

        .placeholder-image svg {
            width: 50%; /* Adjust size as needed */
            height: 50%;
        }

    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="navbar navbar-light bg-transparent">
            </nav>
        <div class="container-fluid">
            <div class="row">
                <!--Left button-->
                <div class="col-md-3">
                    <button class="btn-custom w-100">Created from text <i class="fas fa-file"></i></button>
                    <button class="btn-custom w-100">Created from image <i class="fas fa-image"></i></button>
                </div>
        
                <!-- Image Gallery (Right) -->
                <div class="col-md-9">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-img-top">
                                    <i class="fas fa-image fa-5x" style="color: lightgray;"></i>
                                </div>
                                <div class="card-body">
                                    <p class="card-title">Text</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-img-top">
                                     <i class="fas fa-image fa-5x" style="color: lightgray;"></i>
                                </div>
                                <div class="card-body">
                                    <p class="card-title">Text</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-img-top">
                                     <i class="fas fa-image fa-5x" style="color: lightgray;"></i>
                                </div>
                                <div class="card-body">
                                    <p class="card-title">Text</p>
                                </div>
                            </div>
                        </div>
                    </div>
        
                     <div class="row">
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-img-top">
                                    <i class="fas fa-image fa-5x" style="color: lightgray;"></i>
                                </div>
                                <div class="card-body">
                                    <p class="card-title">Text</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-img-top">
                                     <i class="fas fa-image fa-5x" style="color: lightgray;"></i>
                                </div>
                                <div class="card-body">
                                    <p class="card-title">Text</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-img-top">
                                     <i class="fas fa-image fa-5x" style="color: lightgray;"></i>
                                </div>
                                <div class="card-body">
                                    <p class="card-title">Text</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!--Footer-->
    <footer class="py-0 bg-transparent border-top fixed-bottom"> <!--배경은 투명, 선으로만-->
        <div class="container">
            <p class="m-3 text-center text-color: rgb(195, 193, 193)">@ 2025</p>
        </div>
    </footer>
</body>
</html>
